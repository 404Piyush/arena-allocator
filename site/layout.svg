<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="free" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>
  <g transform="translate(40, 100)">
    <rect width="160" height="120" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
    <text x="80" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#f8fafc">arena struct</text>
    <line x1="0" y1="34" x2="160" y2="34" stroke="#a855f7" stroke-width="1"/>
    <text x="12" y="55" font-size="11" fill="#94a3b8" font-family="ui-monospace,Menlo,monospace">void *base</text>
    <text x="12" y="75" font-size="11" fill="#94a3b8" font-family="ui-monospace,Menlo,monospace">size_t in_use</text>
    <text x="12" y="95" font-size="11" fill="#94a3b8" font-family="ui-monospace,Menlo,monospace">size_t high_wat</text>
    <text x="12" y="115" font-size="11" fill="#94a3b8" font-family="ui-monospace,Menlo,monospace">size_t capacity</text>
  </g>
  <line x1="200" y1="160" x2="280" y2="160" stroke="#a855f7" stroke-width="2"/>
  <g transform="translate(280, 100)">
    <rect width="480" height="120" rx="8" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 4"/>
    <text x="240" y="20" text-anchor="middle" font-size="11" fill="#94a3b8">mmap'd region · capacity bytes</text>
    <rect x="10" y="40" width="240" height="60" fill="url(#bar)" opacity="0.85"/>
    <text x="130" y="75" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">in_use</text>
    <rect x="250" y="40" width="220" height="60" fill="url(#free)" stroke="#475569" stroke-width="1"/>
    <text x="360" y="75" text-anchor="middle" font-size="12" font-weight="500" fill="#94a3b8">free</text>
    <line x1="250" y1="30" x2="250" y2="110" stroke="#fbbf24" stroke-width="3" stroke-dasharray="3 2"/>
    <text x="250" y="125" text-anchor="middle" font-size="10" fill="#fbbf24" font-weight="600">↑ bump ptr</text>
  </g>
  <text x="400" y="260" text-anchor="middle" font-size="11" fill="#64748b">arena_alloc(n)  →  in_use += align16(n);  return base + old</text>
  <text x="400" y="280" text-anchor="middle" font-size="11" fill="#64748b">arena_reset()  →  in_use = 0</text>
  <text x="400" y="300" text-anchor="middle" font-size="11" fill="#64748b">arena_destroy() →  munmap(base, capacity)</text>
</svg>
